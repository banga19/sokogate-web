# ============================================================================
# Sokogate Web — Nginx Configuration
# Serves the Vue.js SPA and proxies API requests to the backend
# ============================================================================

# Upstream API server (resolved via Docker Compose service name)
upstream api_backend {
    server api:3000;
}

server {
    listen 80;
    server_name sokogate.com www.sokogate.com;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Character Encoding ----
    charset utf-8;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---- Content Security Policy (CSP) ----
    # Tailored for the Vue.js SPA:
    #   - 'self' for own assets (JS, CSS, fonts, images)
    #   - https://www.googletagmanager.com for Google Analytics (gtag.js)
    #   - https://api.map.baidu.com for Baidu Maps (Map.vue)
    #   - https://oss.sokogate.com for OSS-hosted images and uploads
    #   - wss://*.easemob.com + https://*.easemob.com for WebIM chat
    #   - 'unsafe-inline' for Vue-injected styles and GA inline script block
    # NOTE: Replace 'unsafe-inline' with a SHA-256 hash or nonce when SSR is added.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://api.map.baidu.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://oss.sokogate.com; connect-src 'self' https://oss.sokogate.com wss://*.easemob.com https://*.easemob.com; font-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self';" always;

    # CSP violation reporting (optional — uncomment when a Report URI endpoint is available)
    # add_header Content-Security-Policy-Report-Only "default-src 'self'; ...; report-uri https://sokogate.com/csp-report;" always;

    # Remove Nginx version from headers
    server_tokens off;

    # ---- Request Size Limits ----
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ---- Timeouts ----
    keepalive_timeout 65;
    send_timeout 30;
    proxy_read_timeout 60;

    # ---- Health Check ----
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ---- Static Assets (long-lived cache, immutable) ----
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /img/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Pre-compressed files (Webpack gzip plugin) ----
    location ~ \.gz$ {
        gzip off;
        add_header Content-Encoding gzip;
        types {
            text/css css.gz;
            application/javascript js.gz;
        }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Robots.txt & Sitemap ----
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- API Proxy ----
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Don't cache API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ---- SPA Fallback (must be last) ----
    location / {
        try_files $uri $uri/ /index.html;

        # HTML should NOT be cached long-term (new deploys change the content)
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
