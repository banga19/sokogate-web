# ============================================================================
# Sokogate — Prometheus Configuration
# ============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "sokogate-api"
    static_configs:
      - targets: ["api:3000"]
    # Metrics endpoint is served under /api/v2 prefix (see routes/index.js)
    metrics_path: /api/v2/metrics
    scheme: http
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
