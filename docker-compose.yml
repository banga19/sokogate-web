# ============================================================================
# Sokogate Web — Docker Compose
#
# Starts the full stack:
#   - Frontend: Vue.js SPA served via Nginx
#   - Backend:  Node.js Express API
#   - Database: PostgreSQL 16
#   - Cache:    Redis 7
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --build            # Rebuild and start
#   docker compose logs -f api              # Watch API logs
#   docker compose down                     # Stop all services
#   docker compose down -v                  # Stop and remove volumes
# ============================================================================

services:
  # ---- Frontend ----
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: sokogate-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_started
    networks:
      - sokogate
    restart: unless-stopped

  # ---- Backend API ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sokogate-api
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sokogate
    restart: unless-stopped
    volumes:
      - api_logs:/app/logs

  # ---- PostgreSQL Database ----
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sokogate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sokogate
      POSTGRES_USER: sokogate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sokogate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sokogate
    restart: unless-stopped

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: sokogate-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - sokogate
    restart: unless-stopped

  # ---- Optional: pgAdmin for DB management ----
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: sokogate-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@sokogate.com
  #     PGADMIN_DEFAULT_PASSWORD: changeme
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - sokogate
  #   restart: unless-stopped

  # ---- Optional: Redis Commander for cache management ----
  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: sokogate-redis-commander
  #   environment:
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
  #   ports:
  #     - "8081:8081"
  #   depends_on:
  #     - redis
  #   networks:
  #     - sokogate
  #   restart: unless-stopped

  # ---- Comment Agent Background Worker ----
  # Processes deferred comment posting jobs from the Redis job queue.
  # Runs the same image as the API but starts the worker entrypoint instead.
  # Note: No HTTP health check — relies on Docker restart on crash.
  # Monitor via: docker logs sokogate-comment-agent-worker
  comment-agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sokogate-comment-agent-worker
    entrypoint: ["node", "src/modules/commentAgent/worker.js"]
    # PID 1 is the worker process — kill -0 checks if it's alive (POSIX, works on Alpine)
    healthcheck:
      test: ["CMD", "kill", "-0", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sokogate
    restart: unless-stopped

  # ---- Prometheus (metrics collection) ----
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sokogate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      api:
        condition: service_started
    networks:
      - sokogate
    restart: unless-stopped

  # ---- Grafana (metrics dashboards) ----
  grafana:
    image: grafana/grafana:11.1.0
    container_name: sokogate-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sokogate
    restart: unless-stopped

volumes:
  postgres_data:
    name: sokogate_postgres_data
  redis_data:
    name: sokogate_redis_data
  api_logs:
    name: sokogate_api_logs
  prometheus_data:
    name: sokogate_prometheus_data
  grafana_data:
    name: sokogate_grafana_data

networks:
  sokogate:
    name: sokogate_network
    driver: bridge
